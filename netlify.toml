[build]
  functions = "."

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/app"
  status = 200

[functions]
  # Tell Netlify to explicitly bundle the config file alongside your functions
  included_files = ["config/config.js"]
  # Alternatively, if you use a JSON config:
  # included_files = ["config/config.json"]
